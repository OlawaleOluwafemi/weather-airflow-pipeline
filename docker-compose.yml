version: '3.8'

services:
  # 1. DATABASE
  postgres:
    image: postgres:13
    container_name: postgres-2
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - airflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. THE INITIALIZER
  airflow-init:
    image: apache/airflow:2.9.1-python3.11
    container_name: airflow-init-2
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-2:5432/${POSTGRES_DB}
      AIRFLOW_UID: 50000
    networks:
      - airflow_net
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_USER} --password ${AIRFLOW_PASSWORD} --firstname Airflow --lastname Admin --role Admin --email admin@example.com
      "

  # 3. THE ORCHESTRATOR
  airflow:
    image: apache/airflow:2.9.1-python3.11
    container_name: airflow-2
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-2:5432/${POSTGRES_DB}
      WEATHER_API_KEY: ${WEATHER_API_KEY}
    volumes:
      - ./dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: bash -c "airflow webserver & airflow scheduler"
    networks:
      - airflow_net

  # 4. REPORTING
  metabase:
    image: metabase/metabase
    container_name: metabase-2
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airflow_net

  # 5. MANAGEMENT GUI
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-2
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airflow_net

volumes:
  postgres_data:

networks:
  airflow_net: